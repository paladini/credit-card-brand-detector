# Publish to npmjs.org on release; also publish to GitHub Packages (profile Packages tab).
# workflow_dispatch runs build + GitHub Packages only (does not touch npmjs).

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}

  github-packages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@paladini'
      - run: npm ci
      - name: Publish to GitHub Packages as @paladini/credit-card-brand-detector
        run: |
          set -euo pipefail
          npm pkg set name=@paladini/credit-card-brand-detector
          set +e
          out="$(npm publish --access public 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          # Version already on GH Packages (often still private): ensure public access.
          if printf '%s\n' "$out" | grep -qiE 'Cannot publish over existing version|EPUBLISHCONFLICT|E409'; then
            echo "Version already published; setting package access to public"
            npm access set status=public @paladini/credit-card-brand-detector --registry=https://npm.pkg.github.com
            exit $?
          fi
          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
