# Publish Node.js package on release:
# - npmjs.org (existing behavior, unchanged)
# - GitHub Packages as @paladini/credit-card-brand-detector
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      target:
        description: Where to publish
        required: true
        default: github-packages
        type: choice
        options:
          - github-packages
          - npm
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    if: github.event_name == 'release' || inputs.target == 'npm' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}

  publish-gpr:
    needs: build
    if: github.event_name == 'release' || inputs.target == 'github-packages' || inputs.target == 'both'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@paladini'
      - run: npm ci
      - name: Publish to GitHub Packages as @paladini/credit-card-brand-detector
        run: |
          npm pkg set name=@paladini/credit-card-brand-detector
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
